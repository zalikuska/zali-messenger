# XcodeGen spec for the iOS shell.
#
# Before the FIRST generate (and after any Core/src/*.rs change):
#   ../build_ios_core.sh          # cross-compiles Rust Core, packages ZaliCore.xcframework
# Then:
#   xcodegen generate
#
# Requires Xcode 26 (iOS 26 SDK) to compile the Liquid Glass APIs.
# Runs on iOS 17+ (Liquid Glass code is guarded by `if #available(iOS 26.0, *)`).
name: ZaliMessenger
options:
  bundleIdPrefix: com.zali
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  ZaliMessenger:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ZaliMessenger
      # Shared web UI produced by `python3 bundle_web.py` (run it first).
      # Added as a *folder reference* (blue folder) so the "Web" subdirectory is
      # preserved in the bundle for Bundle.main.url(..., subdirectory: "Web").
      - path: ../Web/index.html
        buildPhase: resources
      - path: ../Web/style.css
        buildPhase: resources
      - path: ../Web/app.js
        buildPhase: resources
    # ZaliCore.xcframework: the Rust Core crate (`.zali` archive pack/unpack +
    # AES-256-GCM decrypt), cross-compiled for device + simulator by
    # build_ios_core.sh. Static lib, so `embed: false` — nothing to embed at
    # runtime, it links straight into the binary. See ZaliCore.swift.
    dependencies:
      - framework: Frameworks/ZaliCore.xcframework
        embed: false
    settings:
      base:
        INFOPLIST_FILE: ZaliMessenger/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.zali.messenger.ios
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
    # Copy the three web files into a `Web/` folder inside the bundle so the
    # subdirectory lookup in WebViewStore.loadBundledUI() resolves.
    postBuildScripts:
      - name: Stage Web bundle folder
        script: |
          DEST="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/Web"
          mkdir -p "$DEST"
          for f in index.html style.css app.js; do
            cp -f "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/$f" "$DEST/$f" 2>/dev/null || true
          done
        inputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/index.html
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/style.css
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/app.js
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Web/index.html
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Web/style.css
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Web/app.js
